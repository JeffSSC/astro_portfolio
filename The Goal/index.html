<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Jefferson Silva Caires — Full-Stack Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg: #F2EEE6;
    --ink: #14120F;
    --ink-2: #36322B;
    --muted: #8A8478;
    --rule: #CFC8B9;
    --card: #ECE7DC;
    --accent: oklch(0.58 0.14 145);
    --accent-soft: oklch(0.58 0.14 145 / 0.10);
    --serif: "Instrument Serif", ui-serif, Georgia, serif;
    --sans: "Inter", ui-sans-serif, system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  html[data-theme="dark"] {
    --bg: #0E0D0B;
    --ink: #EDE7D8;
    --ink-2: #BDB6A4;
    --muted: #76716A;
    --rule: #2A2722;
    --card: #16140F;
    --accent: oklch(0.75 0.14 145);
    --accent-soft: oklch(0.75 0.14 145 / 0.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }
  ::selection { background: var(--accent); color: var(--bg); }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
  img { display: block; max-width: 100%; }
  .mono { font-family: var(--mono); font-size: 12px; letter-spacing: 0.02em; text-transform: uppercase; color: var(--muted); }
  .serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
  #root { min-height: 100vh; }

  /* ---------- LAYOUT ---------- */
  .container { max-width: 1320px; margin: 0 auto; padding: 0 40px 80px; }
  @media (max-width: 720px) { .container { padding: 0 20px 60px; } }

  .rule { height: 1px; background: var(--rule); margin: 0; }

  /* ---------- NAV ---------- */
  .nav {
    position: sticky; top: 0; z-index: 30;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
    gap: 24px; padding: 20px 40px;
    background: color-mix(in srgb, var(--bg) 85%, transparent);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid transparent;
    transition: border-color .3s, padding .3s;
  }
  .nav-scrolled { border-bottom-color: var(--rule); padding: 14px 40px; }
  .nav-progress {
    position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
    background: var(--accent); transform-origin: left center; transform: scaleX(0);
    transition: transform .15s linear;
  }
  @media (max-width: 720px) { .nav { padding: 14px 20px; grid-template-columns: 1fr auto; }
    .nav-links { display: none; } }
  .nav-brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    font-family: var(--serif); font-size: 20px; line-height: 1;
    border: 1px solid var(--ink); color: var(--ink);
    width: 34px; height: 34px; display: grid; place-items: center;
    letter-spacing: -0.02em;
  }
  .brand-name { font-family: var(--serif); font-size: 18px; letter-spacing: -0.01em; }
  @media (max-width: 520px) { .brand-name { display:none; } }
  .nav-links { display: flex; gap: 28px; }
  .nav-link { display: flex; align-items: baseline; gap: 6px; font-size: 14px; position: relative; }
  .nav-link::after {
    content: ""; position: absolute; left: 0; right: 100%; bottom: -6px;
    height: 1px; background: var(--ink); transition: right .3s ease;
  }
  .nav-link:hover::after { right: 0; }
  .num-sm { font-size: 10px; color: var(--muted); }
  .nav-right { display: flex; align-items: center; gap: 16px; justify-self: end; }
  .lang-switch { display: flex; gap: 6px; font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .lang-switch button { padding: 2px; }
  .lang-switch button.on { color: var(--ink); }
  .theme-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; border: 1px solid var(--rule); border-radius: 999px;
    transition: border-color .2s, background .2s;
  }
  .theme-btn:hover { border-color: var(--ink); background: var(--card); }
  .theme-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--ink);
    box-shadow: inset 0 0 0 2px var(--bg);
  }

  /* ---------- HERO ---------- */
  .hero {
    position: relative;
    padding: 80px 0 60px;
    min-height: 88vh;
    display: flex; flex-direction: column; justify-content: space-between;
    overflow: hidden;
  }
  @media (max-width: 720px) { .hero { padding: 40px 0 40px; min-height: auto; } }
  .hero-grid-bg {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--rule) 1px, transparent 1px),
      linear-gradient(90deg, var(--rule) 1px, transparent 1px);
    background-size: 80px 80px;
    opacity: .3;
    mask-image: radial-gradient(circle at var(--mx,50%) var(--my,50%), black 0%, transparent 60%);
    -webkit-mask-image: radial-gradient(circle at var(--mx,50%) var(--my,50%), black 0%, transparent 60%);
    transition: opacity .4s;
  }
  .hero > * { position: relative; z-index: 1; }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; flex-wrap: wrap; gap: 16px; }
  .hero-meta { display: flex; align-items: center; gap: 10px; }
  .hero-meta.right { justify-content: flex-end; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{ box-shadow: 0 0 0 4px var(--accent-soft);} 50%{ box-shadow: 0 0 0 8px transparent;} }

  .hero-title {
    font-size: clamp(80px, 16vw, 240px);
    line-height: 0.92;
    letter-spacing: -0.04em;
    margin: 0;
  }
  .hero-line { display: block; }
  .hero-title em { font-style: italic; color: var(--accent); }

  .hero-bottom {
    display: grid; grid-template-columns: auto 1fr auto; gap: 48px; align-items: end;
    margin-top: 60px; padding-top: 30px; border-top: 1px solid var(--rule);
  }
  @media (max-width: 860px) {
    .hero-bottom { grid-template-columns: 1fr; gap: 24px; }
  }
  .hero-role { display: flex; flex-direction: column; gap: 4px; }
  .role-text { font-size: 22px; }
  .hero-tagline { max-width: 420px; color: var(--ink-2); margin: 0; font-size: 15px; line-height: 1.55; }
  .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px; background: var(--ink); color: var(--bg);
    font-size: 14px; letter-spacing: -0.005em;
    transition: background .2s, transform .2s;
  }
  .btn-primary:hover { background: var(--accent); color: var(--bg); transform: translateY(-1px); }
  html[data-theme="dark"] .btn-primary { background: var(--ink); color: var(--bg); }

  .btn-ghost {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 14px 20px; border: 1px solid var(--rule);
    font-size: 14px;
    transition: border-color .2s, background .2s;
  }
  .btn-ghost:hover { border-color: var(--ink); background: var(--card); }

  /* ---------- SECTIONS ---------- */
  .section { padding: 100px 0; }
  @media (max-width: 720px) { .section { padding: 60px 0; } }
  .section-head {
    display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 40px;
    align-items: end; margin-bottom: 60px;
  }
  @media (max-width: 860px) {
    .section-head { grid-template-columns: 1fr; gap: 16px; }
  }
  .section-meta { display: flex; flex-direction: column; gap: 4px; }
  .num { color: var(--ink); font-weight: 500; }
  .section-title {
    font-size: clamp(38px, 6vw, 72px);
    line-height: 1.02;
    letter-spacing: -0.03em;
    margin: 0;
  }
  .quiet { color: var(--muted); font-style: italic; }
  .section-right { justify-self: end; }
  @media (max-width: 860px) { .section-right { justify-self: start; } }

  /* ---------- ABOUT ---------- */
  .about-grid { display: grid; grid-template-columns: 1fr 360px; gap: 60px; }
  @media (max-width: 860px) { .about-grid { grid-template-columns: 1fr; gap: 32px; } }
  .about-p { font-family: var(--serif); font-size: 28px; line-height: 1.32; margin: 0 0 18px; color: var(--ink); max-width: 720px; text-wrap: pretty; }
  .about-p:last-child { margin-bottom: 0; }
  .about-side { align-self: start; position: sticky; top: 100px; }
  .kv { margin: 0; display: grid; grid-template-columns: 90px 1fr; gap: 14px 20px; padding: 24px; border: 1px solid var(--rule); background: var(--card); }
  .kv dt { color: var(--muted); margin: 0; padding-top: 2px; }
  .kv dd { margin: 0; font-size: 14px; }

  /* ---------- EXPERIENCE ---------- */
  .exp-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 60px; }
  .exp-item {
    display: grid; grid-template-columns: 200px 1fr; gap: 48px;
    padding-top: 30px; border-top: 1px solid var(--rule);
  }
  .exp-item:first-child { border-top: 0; padding-top: 0; }
  @media (max-width: 720px) { .exp-item { grid-template-columns: 1fr; gap: 20px; } }
  .exp-year { display: flex; flex-direction: column; gap: 4px; }
  .big-year { font-size: 72px; line-height: 1; letter-spacing: -0.03em; color: var(--ink); }
  .exp-main { }
  .exp-head { display: flex; justify-content: space-between; align-items: baseline; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .exp-company { font-size: 40px; line-height: 1.05; letter-spacing: -0.02em; margin: 0; }
  .exp-role { display: flex; gap: 8px; color: var(--muted); }
  .exp-role .sep { color: var(--rule); }
  .exp-bullets { list-style: none; padding: 0; margin: 0; display: grid; gap: 12px; }
  .exp-bullets li { display: grid; grid-template-columns: 30px 1fr; gap: 14px; align-items: baseline; max-width: 640px; color: var(--ink-2); font-size: 15px; line-height: 1.55; }
  .bullet-num { color: var(--muted); }

  /* ---------- STACK ---------- */
  .stack-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 48px; }
  @media (max-width: 860px) { .stack-grid { grid-template-columns: 1fr; gap: 32px; } }
  .stack-label { margin-bottom: 16px; color: var(--muted); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chips.tight { gap: 6px; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; border: 1px solid var(--rule); background: var(--card);
    font-size: 13px; font-family: var(--mono); letter-spacing: 0;
    transition: border-color .2s, background .2s;
  }
  .chip:hover { border-color: var(--ink); }
  .chip-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
  .chips.soft .chip { background: transparent; color: var(--ink-2); }
  .chip-xs {
    display: inline-block; padding: 3px 8px; font-family: var(--mono); font-size: 11px;
    color: var(--ink-2); border: 1px solid var(--rule);
  }
  .chip-xs.soft { color: var(--muted); }

  .certs { display: grid; gap: 16px; }
  .cert {
    display: grid; grid-template-columns: 64px 1fr; gap: 16px; align-items: center;
    padding: 16px; border: 1px solid var(--rule); background: var(--card);
  }
  .cert-badge {
    width: 64px; height: 64px; display: grid; place-items: center;
    background: var(--bg); border: 1px solid var(--rule); position: relative;
  }
  .cert-ring {
    position: absolute; inset: 6px; border: 1px dashed var(--accent); border-radius: 50%;
    animation: spin 18s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .cert-badge .serif { font-size: 18px; position: relative; z-index: 1; }
  .cert-name { font-size: 18px; }
  .cert-meta { margin-top: 2px; color: var(--muted); }

  .marquee {
    margin-top: 60px; padding: 20px 0; border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
    overflow: hidden;
    mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
    -webkit-mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
  }
  .marquee-track {
    display: flex; gap: 36px; align-items: center; width: max-content;
    animation: scroll 40s linear infinite;
  }
  @keyframes scroll { to { transform: translateX(-50%); } }
  .marquee-item { display: flex; align-items: center; gap: 36px; flex-shrink: 0; }
  .marquee-item .serif { font-size: 36px; letter-spacing: -0.02em; }
  .marquee-dot { color: var(--accent); font-size: 14px; }

  /* ---------- PROJECTS ---------- */
  .projects {}
  .proj-list { }
  .proj-row {
    border-top: 1px solid var(--rule);
    padding: 28px 0;
    cursor: default;
    transition: padding .35s ease;
  }
  .proj-row:last-child { border-bottom: 1px solid var(--rule); }
  .proj-row.open { padding: 36px 0; }
  .proj-row-main {
    display: grid; grid-template-columns: 50px 1.1fr 1fr 40px; gap: 24px; align-items: center;
  }
  @media (max-width: 860px) {
    .proj-row-main { grid-template-columns: 40px 1fr 40px; }
    .proj-stack-col { display: none; }
  }
  .proj-num { color: var(--muted); }
  .proj-title-col { }
  .proj-row-title { font-size: clamp(28px, 3.2vw, 40px); line-height: 1.1; margin: 0; letter-spacing: -0.02em; transition: color .3s; }
  .proj-row.open .proj-row-title { color: var(--accent); }
  .proj-row-tag { margin-top: 4px; color: var(--muted); }
  .proj-stack-col { display: flex; flex-wrap: wrap; gap: 6px; }
  .proj-arrow {
    width: 40px; height: 40px; display: grid; place-items: center;
    border: 1px solid var(--rule); justify-self: end;
    transition: background .2s, border-color .2s, transform .3s;
  }
  .proj-arrow:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .proj-row.open .proj-arrow { transform: rotate(-45deg); }
  .proj-row-expand {
    display: grid; grid-template-rows: 0fr;
    transition: grid-template-rows .4s ease, opacity .3s ease, margin-top .3s ease;
    opacity: 0; margin-top: 0;
  }
  .proj-row.open .proj-row-expand { grid-template-rows: 1fr; opacity: 1; margin-top: 20px; }
  .proj-row-expand > * { min-height: 0; overflow: hidden; }
  .proj-row-sum { max-width: 720px; font-size: 16px; margin: 0 0 16px; padding-left: 74px; color: var(--ink-2); }
  @media (max-width: 860px) { .proj-row-sum { padding-left: 64px; } }
  .proj-row-foot { display: flex; justify-content: space-between; align-items: flex-end; gap: 20px; padding-left: 74px; flex-wrap: wrap; }
  @media (max-width: 860px) { .proj-row-foot { padding-left: 64px; } }
  .proj-link { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; border-bottom: 1px solid var(--ink); padding-bottom: 2px; }
  .proj-link:hover { color: var(--accent); border-color: var(--accent); }

  .proj-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; background: var(--rule); border: 1px solid var(--rule); }
  @media (max-width: 720px) { .proj-grid { grid-template-columns: 1fr; } }
  .proj-card { background: var(--bg); padding: 32px; display: flex; flex-direction: column; gap: 14px; min-height: 320px; }
  .proj-card-top { display: flex; justify-content: space-between; color: var(--muted); }
  .tag { color: var(--ink-2); }
  .proj-card-title { font-size: 34px; line-height: 1.05; margin: 0; letter-spacing: -0.02em; }
  .proj-card-sum { color: var(--ink-2); margin: 0; flex: 1; font-size: 15px; }

  .filter-row { display: flex; gap: 4px; }
  .filter {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px; border: 1px solid var(--rule);
    transition: border-color .2s, background .2s, color .2s;
  }
  .filter:hover { border-color: var(--ink); }
  .filter.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .filter.on .mono { color: var(--bg); }
  .filter .count { color: var(--muted); }
  .filter.on .count { color: color-mix(in srgb, var(--bg) 70%, transparent); }

  .more-projects { margin-top: 40px; display: flex; gap: 16px; align-items: baseline; }
  .more-link { display: inline-flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--ink); padding-bottom: 4px; }
  .more-link .serif { font-size: 28px; letter-spacing: -0.02em; }
  .more-link:hover { color: var(--accent); border-color: var(--accent); }

  /* ---------- TESTIMONIALS ---------- */
  .quote {
    position: relative;
    margin: 0;
    padding: 40px 0 40px 80px;
    max-width: 900px;
    animation: quoteIn .6s cubic-bezier(.22,.8,.2,1);
  }
  @keyframes quoteIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @media (max-width: 720px) { .quote { padding: 20px 0 20px 50px; } }
  .quote-mark {
    position: absolute; left: 0; top: 10px;
    font-size: 140px; line-height: 0.7; color: var(--accent);
  }
  @media (max-width: 720px) { .quote-mark { font-size: 80px; } }
  .quote-text {
    font-size: clamp(24px, 3vw, 34px);
    line-height: 1.32; margin: 0 0 30px; letter-spacing: -0.01em;
    text-wrap: pretty;
  }
  .quote-foot { display: flex; align-items: center; gap: 16px; }
  .quote-avatar {
    width: 48px; height: 48px; display: grid; place-items: center;
    background: var(--card); border: 1px solid var(--rule);
    font-family: var(--mono); font-size: 13px; color: var(--ink);
  }
  .quote-name { font-size: 18px; }
  .quote-nav { display: flex; align-items: center; gap: 12px; }
  .quote-nav button { width: 34px; height: 34px; display: grid; place-items: center; border: 1px solid var(--rule); transition: background .2s, border-color .2s; }
  .quote-nav button:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .quote-dots { margin-top: 20px; display: flex; gap: 8px; padding-left: 80px; }
  @media (max-width: 720px) { .quote-dots { padding-left: 50px; } }
  .dot-btn { width: 24px; height: 4px; background: var(--rule); transition: background .2s, width .3s; }
  .dot-btn.on { background: var(--ink); width: 40px; }

  /* ---------- CONTACT ---------- */
  .contact-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; background: var(--rule); border: 1px solid var(--rule); }
  @media (max-width: 860px) { .contact-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 520px) { .contact-grid { grid-template-columns: 1fr; } }
  .contact-card {
    background: var(--bg); padding: 32px 28px; display: flex; flex-direction: column; gap: 12px;
    min-height: 180px; position: relative;
    transition: background .25s, color .25s;
  }
  .contact-card:hover { background: var(--ink); color: var(--bg); }
  .contact-card:hover .mono { color: color-mix(in srgb, var(--bg) 60%, transparent); }
  .contact-label { font-size: 38px; letter-spacing: -0.02em; line-height: 1; margin-top: 8px; }
  .contact-sub { margin-top: auto; }

  /* ---------- FOOTER ---------- */
  .footer { padding-top: 80px; border-top: 1px solid var(--rule); margin-top: 80px; }
  .footer-big { font-size: clamp(60px, 14vw, 200px); line-height: 1; letter-spacing: -0.04em; margin-bottom: 30px; }
  .footer-row { display: flex; justify-content: space-between; padding-top: 20px; border-top: 1px solid var(--rule); flex-wrap: wrap; gap: 16px; }
  .footer-row .mono { color: var(--muted); }
  .footer-row a:hover { color: var(--accent); }

  /* ---------- TWEAKS PANEL ---------- */
  .tweaks {
    position: fixed; right: 20px; bottom: 20px; z-index: 100;
    width: 280px;
    background: var(--bg); border: 1px solid var(--ink);
    box-shadow: 0 10px 40px color-mix(in srgb, var(--ink) 15%, transparent);
    font-size: 13px;
  }
  .tweaks-head { display: flex; justify-content: space-between; align-items: baseline; padding: 14px 16px; border-bottom: 1px solid var(--rule); }
  .tweaks-head .serif { font-size: 22px; }
  .tweaks-body { padding: 14px 16px; display: grid; gap: 14px; }
  .tweak-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .tweak-row.col { flex-direction: column; align-items: stretch; gap: 6px; }
  .seg { display: flex; border: 1px solid var(--rule); }
